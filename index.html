<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ระบบเบิก PPE</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}

input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 5px;
  border: none;
  width: 30%;
}

button {
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.add { background: #22c55e; }
.save { background: #3b82f6; }

.row {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">
<h2>📦 ระบบเบิก PPE</h2>

<label>ชื่อผู้เบิก:</label><br>
<input id="requester" placeholder="ชื่อผู้เบิก"><br><br>

<div id="items"></div>

<button class="add" onclick="addItem()">+ เพิ่มรายการ</button><br>
<button class="save" onclick="submitData()">บันทึก</button>
</div>

<script>
let items = [];
let products = [];

const scriptURL = "https://script.google.com/macros/s/AKfycbwvLvTK_JejpPsugtg_o8p0eHzPQi3SHaE94k3rOqavPmWgVotU_nxb5bxDswHK1OPhPw/exec";

// โหลดสินค้า (เรียกครั้งเดียว)
fetch(scriptURL)
.then(res => res.json())
.then(data => {
  products = data;

  // เคลียร์ก่อน (กันซ้ำ)
  document.getElementById("items").innerHTML = "";
  items = [];

  addItem(); // เรียกครั้งเดียว
});

// เพิ่มแถว
function addItem() {
  const index = items.length;

  let options = products.map(p => 
    `<option value="${p.name}">${p.name} (เหลือ ${p.stock})</option>`
  ).join("");

  const div = document.createElement("div");
  div.className = "row";
  div.innerHTML = `
    <select id="product${index}">${options}</select>
    <input id="qty${index}" type="number" placeholder="จำนวน">
    <input id="user${index}" placeholder="ผู้ใช้">
  `;

  document.getElementById("items").appendChild(div);
  items.push(index);
}

// ส่งข้อมูล
function submitData() {
  const requester = document.getElementById("requester").value;

  if (!requester) {
    alert("กรุณาใส่ชื่อผู้เบิก");
    return;
  }

  let data = {
    requester: requester,
    items: []
  };

  items.forEach(i => {
    const product = document.getElementById(`product${i}`).value;
    const qty = document.getElementById(`qty${i}`).value;
    const user = document.getElementById(`user${i}`).value;

    if(product && qty && user){
      data.items.push({ product, qty, user });
    }
  });

  if (data.items.length === 0) {
    alert("กรุณาใส่รายการ");
    return;
  }

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("บันทึกสำเร็จ!");
    location.reload();
  })
  .catch(err => alert("Error: " + err));
}
</script>

</body>
</html>
