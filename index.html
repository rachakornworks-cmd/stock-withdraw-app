<!DOCTYPE html>
<html>
<head>
  <title>เบิกของ</title>
</head>
<body>

<h2>ฟอร์มเบิกของ</h2>

ชื่อผู้เบิก:
<input id="requester"><br><br>

<div id="items"></div>

<button onclick="addItem()">+ เพิ่มรายการ</button><br><br>

<button onclick="submitData()">บันทึก</button>

<script>
let items = [];

function addItem() {
  const index = items.length;

  const div = document.createElement("div");
  div.innerHTML = `
    สินค้า: <input id="product${index}">
    จำนวน: <input id="qty${index}">
    ผู้ใช้: <input id="user${index}">
  `;

  document.getElementById("items").appendChild(div);
  items.push(index);
}

function submitData() {
  const requester = document.getElementById("requester").value;

  let data = {
    requester: requester,
    items: []
  };

  items.forEach(i => {
    data.items.push({
      product: document.getElementById(`product${i}`).value,
      qty: document.getElementById(`qty${i}`).value,
      user: document.getElementById(`user${i}`).value
    });
  });

  fetch("PUT_YOUR_WEB_APP_URL_HERE", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => alert("บันทึกสำเร็จ"));
}
</script>

</body>
</html>
