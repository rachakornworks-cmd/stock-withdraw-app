<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เบิก PPE</title>

<style>
body {
  background: #0f172a;
  color: #fff;
  font-family: sans-serif;
  margin: 0;
}

.container {
  padding: 15px;
}

h2 {
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

.add { background: #22c55e; }
.save { background: #3b82f6; }
.delete { background: #ef4444; }

.stock {
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">
<h2>📦 เบิก PPE</h2>

<div class="card">
<input id="requester" placeholder="ชื่อผู้เบิก">
</div>

<div id="items"></div>

<button class="add" onclick="addItem()">+ เพิ่มรายการ</button>
<button class="save" onclick="submitData()">บันทึก</button>
</div>

<script>
let items = [];
let products = [];

const scriptURL = "https://script.google.com/macros/s/AKfycbxK0--VHOYNdq3XDnWAc6u76SLcocYIkha1efvLfKPQdpGUwX5FoGlJSYGbrTs0g1Kfeg/exec";

fetch(scriptURL)
.then(res => res.json())
.then(data => {
  products = data;
  addItem();
});

function addItem() {
  const id = Date.now();

  let options = products.map(p =>
    `<option value="${p.name}" data-stock="${p.stock}">
      ${p.name} (เหลือ ${p.stock})
    </option>`
  ).join("");

  const div = document.createElement("div");
  div.className = "card";
  div.id = "row_" + id;

  div.innerHTML = `
    <select id="product${id}" onchange="updateStock(${id})">
      ${options}
    </select>

    <div class="stock" id="stock_${id}"></div>

    <input type="number" min="1" id="qty${id}" placeholder="จำนวน"
      oninput="genUsers(${id})">

    <div id="users_${id}"></div>

    <button class="delete" onclick="removeItem(${id})">ลบ</button>
  `;

  document.getElementById("items").appendChild(div);
  items.push(id);

  updateStock(id);
}

// แสดง stock
function updateStock(id) {
  const select = document.getElementById(`product${id}`);
  const stock = select.options[select.selectedIndex].dataset.stock;
  document.getElementById(`stock_${id}`).innerText = "คงเหลือ: " + stock;
}

// สร้างช่อง user + กันเกิน stock
function genUsers(id) {
  const qtyInput = document.getElementById(`qty${id}`);
  const qty = Number(qtyInput.value);

  const select = document.getElementById(`product${id}`);
  const stock = Number(select.options[select.selectedIndex].dataset.stock);

  const box = document.getElementById(`users_${id}`);
  box.innerHTML = "";

  if (qty <= 0) {
    qtyInput.value = "";
    return;
  }

  // ❌ กันเกิน stock
  if (qty > stock) {
    alert(`❗ ของเหลือ ${stock} ชิ้น`);
    qtyInput.value = stock;
    return genUsers(id);
  }

  for (let i = 0; i < qty; i++) {
    box.innerHTML += `<input placeholder="ผู้ใช้คนที่ ${i+1}" id="user_${id}_${i}">`;
  }
}

function removeItem(id) {
  document.getElementById("row_" + id).remove();
  items = items.filter(i => i !== id);
}

function submitData() {
  const requester = document.getElementById("requester").value;

  if (!requester) {
    alert("❗ ใส่ชื่อผู้เบิก");
    return;
  }

  if (items.length === 0) {
    alert("❗ ต้องมีรายการ");
    return;
  }

  let data = { requester, items: [] };

  for (let id of items) {
    const product = document.getElementById(`product${id}`).value;
    const qty = Number(document.getElementById(`qty${id}`).value);

    if (!qty || qty <= 0) {
      alert("❗ จำนวนไม่ถูกต้อง");
      return;
    }

    for (let i = 0; i < qty; i++) {
      const user = document.getElementById(`user_${id}_${i}`).value;

      if (!user) {
        alert("❗ ใส่ชื่อผู้ใช้ให้ครบ");
        return;
      }

      data.items.push({ product, qty: 1, user });
    }
  }

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("✅ บันทึกสำเร็จ");
    location.reload();
  });
}
</script>

</body>
</html>
