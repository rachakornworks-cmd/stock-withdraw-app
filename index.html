<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { background:#0f172a; color:white; font-family:sans-serif; margin:0; }
.container { padding:15px; }
.card { background:#1e293b; padding:12px; border-radius:10px; margin-bottom:10px; }

input, select {
  width:100%; padding:10px; margin-top:5px;
  border-radius:8px; border:none;
}

button {
  width:100%; padding:12px; margin-top:10px;
  border:none; border-radius:10px;
}

.add { background:#22c55e; }
.save { background:#3b82f6; }
.delete { background:#ef4444; }

.stock { font-size:12px; color:#94a3b8; }

/* Loading */
#loading {
  display:none; position:fixed; top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center; align-items:center;
  flex-direction:column;
  z-index:9999;
}

.spinner {
  border:4px solid #333;
  border-top:4px solid #22c55e;
  border-radius:50%;
  width:40px; height:40px;
  animation:spin 1s linear infinite;
}

@keyframes spin { 100% { transform:rotate(360deg);} }
</style>
</head>

<body>

<div class="container">
<h2>📦 เบิก PPE</h2>

<input id="requester" placeholder="ชื่อผู้เบิก">

<div id="items"></div>

<button class="add" onclick="addItem()">+ เพิ่มรายการ</button>
<button class="save" onclick="submitData()">บันทึก</button>
</div>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p id="loadingText">กำลังโหลด...</p>
</div>

<script>
let items = [];
let products = [];

const scriptURL = "https://script.google.com/macros/s/AKfycbyD4O6PIABCkg5QqqFK9UBfIZcmS-ti3eviZzPF8KPWpbmY27KV-qz4aPDdUDh0LXrH8g/exec";

/* ===== Loading Control ===== */
function showLoading(text){
  document.getElementById("loadingText").innerText = text;
  document.getElementById("loading").style.display = "flex";
}

function hideLoading(){
  document.getElementById("loading").style.display = "none";
}

/* ===== โหลดข้อมูล ===== */
showLoading("🔄 กำลังดึงข้อมูล...");

fetch(scriptURL)
.then(res => res.json())
.then(data => {
  products = data;
  addItem();
  hideLoading();
})
.catch(() => {
  hideLoading();
  alert("โหลดข้อมูลไม่สำเร็จ");
});

/* ===== เพิ่มรายการ ===== */
function addItem(){
  const id = Date.now();

  let options = products.map(p =>
    `<option value="${p.name}" data-stock="${p.stock}">
      ${p.name}
    </option>`
  ).join("");

  const div = document.createElement("div");
  div.className = "card";
  div.id = "row_" + id;

  div.innerHTML = `
    <select id="product${id}" onchange="updateStock(${id})">
      ${options}
    </select>

    <div class="stock" id="stock_${id}"></div>

    <input type="number" min="1" id="qty${id}" placeholder="จำนวน"
      oninput="genUsers(${id})">

    <div id="users_${id}"></div>

    <button class="delete" onclick="removeItem(${id})">ลบ</button>
  `;

  document.getElementById("items").appendChild(div);
  items.push(id);

  updateStock(id);
}

/* ===== แสดง stock ===== */
function updateStock(id){
  const s = document.getElementById(`product${id}`);
  const stock = s.options[s.selectedIndex].dataset.stock;
  document.getElementById(`stock_${id}`).innerText = "คงเหลือ: " + stock;
}

/* ===== สร้าง user ===== */
function genUsers(id){
  const qty = Number(document.getElementById(`qty${id}`).value);
  const box = document.getElementById(`users_${id}`);
  box.innerHTML = "";

  const stock = Number(document.getElementById(`product${id}`)
    .selectedOptions[0].dataset.stock);

  if (qty <= 0){
    document.getElementById(`qty${id}`).value = "";
    return;
  }

  if (qty > stock){
    document.getElementById(`qty${id}`).value = stock;
    return genUsers(id);
  }

  for (let i=0;i<qty;i++){
    box.innerHTML += `<input placeholder="ผู้ใช้คนที่ ${i+1}" id="user_${id}_${i}">`;
  }
}

/* ===== ลบ ===== */
function removeItem(id){
  document.getElementById("row_"+id).remove();
  items = items.filter(i=>i!==id);
}

/* ===== บันทึก ===== */
function submitData(){
  const requester = document.getElementById("requester").value;

  if (!requester){ showLoading("❗ ใส่ชื่อผู้เบิก"); setTimeout(hideLoading,1200); return; }
  if (items.length === 0){ showLoading("❗ ต้องมีรายการ"); setTimeout(hideLoading,1200); return; }

  let data = { requester, items: [] };

  for (let id of items){
    const product = document.getElementById(`product${id}`).value;
    const qty = Number(document.getElementById(`qty${id}`).value);

    if (!qty || qty <= 0){
      showLoading("❗ จำนวนไม่ถูกต้อง");
      setTimeout(hideLoading,1200);
      return;
    }

    for (let i=0;i<qty;i++){
      const user = document.getElementById(`user_${id}_${i}`).value;

      if (!user){
        showLoading("❗ ใส่ชื่อผู้ใช้ให้ครบ");
        setTimeout(hideLoading,1200);
        return;
      }

      data.items.push({ product, qty:1, user });
    }
  }

  showLoading("⏳ กำลังบันทึกข้อมูล...");

  fetch(scriptURL,{
    method:"POST",
    body:JSON.stringify(data)
  })
  .then(()=>{
    showLoading("✅ บันทึกสำเร็จ");

    setTimeout(()=>{
      location.reload();
    },3000);
  })
  .catch(err=>{
    showLoading("❌ "+err);
    setTimeout(hideLoading,1500);
  });
}
</script>

</body>
</html>
