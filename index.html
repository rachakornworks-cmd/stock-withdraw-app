<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ระบบเบิก PPE</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 20px;
}

.container {
  max-width: 650px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}

input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 5px;
  border: none;
}

.row {
  margin-bottom: 10px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.add { background: #22c55e; }
.save { background: #3b82f6; }
.delete { background: #ef4444; }
</style>
</head>

<body>

<div class="container">
<h2>📦 ระบบเบิก PPE</h2>

<input id="requester" placeholder="ชื่อผู้เบิก"><br><br>

<div id="items"></div>

<button class="add" onclick="addItem()">+ เพิ่มรายการ</button>
<button class="save" onclick="submitData()">บันทึก</button>
</div>

<script>
let items = [];
let products = [];

const scriptURL = "https://script.google.com/macros/s/AKfycbwXq1ODwsyX8vEHEIFoPcjiTvVviCY2CalHst0fWqXD6SqQL-JrNeArbxQoxgZrvQIiNA/exec";

fetch(scriptURL)
.then(res => res.json())
.then(data => {
  products = data;
  addItem();
});

// เพิ่มรายการ
function addItem() {
  const id = Date.now();

  let options = products.map(p =>
    `<option value="${p.name}">${p.name} (เหลือ ${p.stock})</option>`
  ).join("");

  const div = document.createElement("div");
  div.className = "row";
  div.id = "row_" + id;

  div.innerHTML = `
    <select id="product${id}">${options}</select>
    <input type="number" min="1" id="qty${id}" placeholder="จำนวน" onchange="genUsers(${id})">
    <div id="users_${id}"></div>
    <button class="delete" onclick="removeItem(${id})">ลบ</button>
  `;

  document.getElementById("items").appendChild(div);
  items.push(id);
}

// สร้างช่อง user
function genUsers(id) {
  const qty = Number(document.getElementById(`qty${id}`).value);
  const box = document.getElementById(`users_${id}`);

  box.innerHTML = "";

  if (qty <= 0) {
    alert("❗ จำนวนต้องมากกว่า 0");
    document.getElementById(`qty${id}`).value = "";
    return;
  }

  for (let i = 0; i < qty; i++) {
    box.innerHTML += `<input placeholder="ผู้ใช้คนที่ ${i+1}" id="user_${id}_${i}">`;
  }
}

// ลบรายการ
function removeItem(id) {
  document.getElementById("row_" + id).remove();
  items = items.filter(i => i !== id);
}

// ส่งข้อมูล
function submitData() {
  const requester = document.getElementById("requester").value;

  if (!requester) {
    alert("❗ ใส่ชื่อผู้เบิก");
    return;
  }

  if (items.length === 0) {
    alert("❗ ต้องมีอย่างน้อย 1 รายการ");
    return;
  }

  let data = { requester, items: [] };

  for (let id of items) {
    const product = document.getElementById(`product${id}`).value;
    const qty = Number(document.getElementById(`qty${id}`).value);

    if (!product || !qty || qty <= 0) {
      alert("❗ จำนวนต้องมากกว่า 0");
      return;
    }

    for (let i = 0; i < qty; i++) {
      const user = document.getElementById(`user_${id}_${i}`)?.value;

      if (!user) {
        alert("❗ ใส่ชื่อผู้ใช้ให้ครบ");
        return;
      }

      data.items.push({
        product,
        qty: 1,
        user
      });
    }
  }

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("✅ บันทึกสำเร็จ");
    location.reload();
  })
  .catch(err => alert("Error: " + err));
}
</script>

</body>
</html>
