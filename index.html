<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>เบิกของ</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}

input, select {
  padding: 8px;
  margin: 5px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.add { background: #22c55e; }
.save { background: #3b82f6; }

.row {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">
<h2>📦 ระบบเบิก PPE</h2>

<label>ชื่อผู้เบิก:</label><br>
<input id="requester"><br><br>

<div id="items"></div>

<button class="add" onclick="addItem()">+ เพิ่มรายการ</button><br>
<button class="save" onclick="submitData()">บันทึก</button>
</div>

<script>
let items = [];
let products = [];

const scriptURL = "PUT_YOUR_WEB_APP_URL_HERE";

// โหลดสินค้า
fetch(scriptURL)
.then(res => res.json())
.then(data => {
  products = data;
  addItem();
});

// เพิ่มแถว
function addItem() {
  const index = items.length;

  let options = products.map(p => `<option value="${p}">${p}</option>`).join("");

  const div = document.createElement("div");
  div.className = "row";
  div.innerHTML = `
    <select id="product${index}">
      ${options}
    </select>
    <input id="qty${index}" type="number" placeholder="จำนวน">
    <input id="user${index}" placeholder="ผู้ใช้">
  `;

  document.getElementById("items").appendChild(div);
  items.push(index);
}

// ส่งข้อมูล
function submitData() {
  const requester = document.getElementById("requester").value;

  let data = {
    requester: requester,
    items: []
  };

  items.forEach(i => {
    const product = document.getElementById(`product${i}`).value;
    const qty = document.getElementById(`qty${i}`).value;
    const user = document.getElementById(`user${i}`).value;

    if(product && qty && user){
      data.items.push({ product, qty, user });
    }
  });

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("บันทึกสำเร็จ!");
    location.reload();
  });
}
</script>

</body>
</html>
