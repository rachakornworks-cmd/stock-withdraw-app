<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ระบบเบิก PPE</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 20px;
}

.container {
  max-width: 650px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}

input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 5px;
  border: none;
}

.row {
  margin-bottom: 10px;
  display: flex;
  align-items: center;
}

.row input, .row select {
  width: 25%;
}

button {
  padding: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.add { background: #22c55e; margin-top: 10px; }
.save { background: #3b82f6; margin-top: 10px; }
.delete { background: #ef4444; margin-left: 5px; }
</style>
</head>

<body>

<div class="container">
<h2>📦 ระบบเบิก PPE</h2>

<label>ชื่อผู้เบิก:</label><br>
<input id="requester" placeholder="ชื่อผู้เบิก"><br><br>

<div id="items"></div>

<button class="add" onclick="addItem()">+ เพิ่มรายการ</button><br>
<button class="save" onclick="submitData()">บันทึก</button>
</div>

<script>
let items = [];
let products = [];

const scriptURL = "https://script.google.com/macros/s/AKfycbyd8Zw8MIPYksrCmI6NNmKzXbNzOVJ6asiM67KjGIbh8aRoo3NTXxEbQaIpf_yXRynIfA/exec";

// โหลดสินค้า
fetch(scriptURL)
.then(res => res.json())
.then(data => {
  products = data;
  document.getElementById("items").innerHTML = "";
  items = [];
  addItem();
});

// เพิ่มรายการ
function addItem() {
  const index = Date.now(); // กัน id ซ้ำ

  let options = products.map(p => 
    `<option value="${p.name}">${p.name} (เหลือ ${p.stock})</option>`
  ).join("");

  const div = document.createElement("div");
  div.className = "row";
  div.id = "row_" + index;

  div.innerHTML = `
    <select id="product${index}">${options}</select>
    <input id="qty${index}" type="number" placeholder="จำนวน">
    <input id="user${index}" placeholder="ผู้ใช้">
    <button class="delete" onclick="removeItem(${index})">ลบ</button>
  `;

  document.getElementById("items").appendChild(div);
  items.push(index);
}

// ลบรายการ
function removeItem(index) {
  document.getElementById("row_" + index).remove();
  items = items.filter(i => i !== index);
}

// ส่งข้อมูล
function submitData() {
  const requester = document.getElementById("requester").value;

  if (!requester) {
    alert("❗ กรุณาใส่ชื่อผู้เบิก");
    return;
  }

  let data = {
    requester: requester,
    items: []
  };

  for (let i of items) {
    const product = document.getElementById(`product${i}`)?.value;
    const qty = document.getElementById(`qty${i}`)?.value;
    const user = document.getElementById(`user${i}`)?.value;

    // ❌ ถ้ามีแถวไหนกรอกไม่ครบ → ห้ามบันทึก
    if (!product || !qty || !user) {
      alert("❗ กรุณากรอกข้อมูลให้ครบทุกช่อง");
      return;
    }

    data.items.push({ product, qty, user });
  }

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("✅ บันทึกสำเร็จ!");
    location.reload();
  })
  .catch(err => alert("Error: " + err));
}
</script>

</body>
</html>
